version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_KEY=${VITE_SUPABASE_KEY}
    networks:
      - seravie-network

  supabase:
    image: supabase/postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: seravie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - seravie-network

volumes:
  postgres_data:

networks:
  seravie-network:
    driver: bridge
